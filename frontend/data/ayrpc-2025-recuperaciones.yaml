      - id: "clase-1-p5"
        orden: 5
        tipo: "texto"
        pregunta: "¿Dónde se inicia la búsqueda de compatibilidad entre componentes?"
        respuesta_esperada: "Debe responder que la búsqueda se inicia en la página oficial del fabricante y/o en el manual de usuario de la placa madre o componente."
        conceptos_obligatorios:
          - "página del fabricante"
          - "manual de usuario"
        aceptar_si_menciona:
          fabricante:
            - "página del fabricante"
            - "web del fabricante"
            - "sitio oficial"
            - "página oficial"
            - "manufacturer"
          manual:
            - "manual"
            - "manual de usuario"
            - "manual de la placa"
            - "qvl"
            - "lista de compatibilidad"
            - "support list"
        rubrica:
          correcto: "La respuesta indica que la compatibilidad se verifica desde la página oficial del fabricante y el manual/listas de compatibilidad."
          parcial: "La respuesta menciona buscar en internet o revisar especificaciones, pero no identifica fabricante/manual como fuente principal."
          incorrecto: "La respuesta propone fuentes no confiables o no responde dónde iniciar la búsqueda."
        feedback:
          correcto: "Correcto. Fabricante y manual son las fuentes principales."
          parcial: "Bien, pero conviene ser más específico: página oficial y manual."
          incorrecto: "Revisá el criterio de compatibilidad: primero fabricante y manual."

      - id: "clase-1-p6"
        orden: 6
        tipo: "texto"
        pregunta: "¿Qué puede pasar si nuestra gestión de cable no es óptima?"
        respuesta_esperada: "Debe mencionar que una mala gestión de cables puede generar mal flujo de aire, temperaturas más altas, obstrucciones, daño en cables/conectores o problemas físicos dentro del gabinete."
        conceptos_obligatorios:
          - "mal flujo de aire"
          - "daño de cableado"
        aceptar_si_menciona:
          flujo_aire:
            - "mal flujo de aire"
            - "mala ventilación"
            - "airflow"
            - "temperatura"
            - "calentamiento"
            - "sobrecalentamiento"
            - "obstrucción"
          cableado:
            - "daño de cableado"
            - "dañar cables"
            - "cables cortados"
            - "cables pellizcados"
            - "conectores dañados"
            - "interferencia con ventiladores"
            - "cables tocando fans"
        rubrica:
          correcto: "La respuesta menciona pérdida de flujo de aire/ventilación y posible daño físico al cableado o interferencia con componentes."
          parcial: "La respuesta menciona solo temperatura o solo desorden de cables, pero no desarrolla consecuencias."
          incorrecto: "La respuesta no identifica problemas reales causados por mala gestión de cables."
        feedback:
          correcto: "Correcto. La mala gestión de cables afecta ventilación y puede dañar componentes o cableado."
          parcial: "Bien, pero faltó mencionar flujo de aire y posible daño de cables."
          incorrecto: "Revisá por qué el cable management no es solo estética: también afecta temperatura y seguridad."
